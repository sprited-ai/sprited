# Demo site -> https://sprited-ai.github.io/sprited
name: pages

on:
  push:
    branches: [main]
    paths: ["demo/**", "examples/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stage site
        run: |
          mkdir -p _site/assets
          cp demo/index.html _site/
          cp examples/*.spritesheet.png examples/*.turntable.webp _site/assets/
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
